services:

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./static:/static
      - ./models:/models
      - /Volumes/USB1/FACE.ai-Backup:/data/backups
    environment:
      - FACE_AI_DB=/data/face_ai.db
      - FACE_AI_STATIC=/static
      - ENV=production
      - FACE_AI_ENABLE_DDG=${FACE_AI_ENABLE_DDG:-true}
    ports:
      - "${FACE_AI_BIND_IP:-100.72.122.51}:8010:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn api:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./static:/static
      - ./models:/models
      - ./models/insightface_home:/root/.insightface
      - /Volumes/USB1/FACE.ai-Backup:/data/backups
    environment:
      - FACE_AI_DB=/data/face_ai.db
      - FACE_AI_STATIC=/static
    command: python worker.py
    depends_on:
      api:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./static:/static
      - ./models:/models
    environment:
      - FACE_AI_DB=/data/face_ai.db
      - FACE_AI_STATIC=/static
    ports:
      - "${FACE_AI_BIND_IP:-100.72.122.51}:8011:8001"
    command: python face_ai_mcp_server.py
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "${FACE_AI_BIND_IP:-100.72.122.51}:80:80"
    depends_on:
      api:
        condition: service_healthy

