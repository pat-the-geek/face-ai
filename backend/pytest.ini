[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
addopts =
    -ra
    --strict-markers
markers =
    slow: tests qui dépassent ~1s (à exclure du dev quotidien via -m "not slow")
